# outputs.conf
# Tells Splunk Forwarder where to send logs (Splunk Indexer address).
# Location: /opt/splunkforwarder/etc/system/local/outputs.conf

[tcpout]
defaultGroup = default-autolb-group

[tcpout:default-autolb-group]
server = YOUR_SPLUNK_IP:9997        # ← replace with your Splunk server IP

[tcpout-server://YOUR_SPLUNK_IP:9997]