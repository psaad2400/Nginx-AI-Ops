# inputs.conf
# Tells Splunk Forwarder which files to monitor and where to send them.
# Location: /opt/splunkforwarder/etc/system/local/inputs.conf

# ── Monitor nginx access log ──────────────────────────────────────────────────
[monitor:///var/log/nginx/access.log]
disabled = false
index = nginx
sourcetype = nginx:access

# ── Monitor nginx error log ───────────────────────────────────────────────────
[monitor:///var/log/nginx/error.log]
disabled = false
index = nginx
sourcetype = nginx:error