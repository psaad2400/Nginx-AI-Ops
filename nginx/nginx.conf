user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {

    # ── Basic Settings ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    types_hash_max_size 2048;

    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;

    # ── Custom Log Format for Splunk ──────────────────────────────────────────
    # All fields are explicitly named so Splunk can extract them automatically.
    # This is the key config that powers the AI query agent.
    log_format splunk_format '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'request_time=$request_time '
                             'upstream_time=$upstream_response_time '
                             'upstream_addr=$upstream_addr '
                             'host=$host '
                             'server_name=$server_name '
                             'request_method=$request_method '
                             'uri=$uri '
                             'args=$args '
                             'bytes_sent=$bytes_sent '
                             'request_length=$request_length';

    # ── Logging ───────────────────────────────────────────────────────────────
    # Uses the custom splunk_format defined above
    access_log /var/log/nginx/access.log splunk_format;

    # ── SSL Settings ──────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;

    # ── Virtual Host Configs ──────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

}